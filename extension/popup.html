<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 280px; padding: 16px; font-family: -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; font-size: 13px; }
h2 { font-size: 16px; margin-bottom: 4px; color: #f8fafc; }
.sub { font-size: 11px; color: #64748b; margin-bottom: 12px; }
.row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.toggle { position: relative; width: 40px; height: 22px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #334155; border-radius: 22px; transition: 0.2s; }
.slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #64748b; border-radius: 50%; transition: 0.2s; }
input:checked + .slider { background: #22c55e; }
input:checked + .slider:before { background: #fff; transform: translateX(18px); }
.btn { width: 100%; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-primary { background: #22c55e; color: #fff; }
.btn-primary:hover { background: #16a34a; }
.btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; margin-top: 6px; }
.stats { margin: 10px 0; font-size: 12px; color: #64748b; }
.stats span { color: #22c55e; font-weight: 600; }
.verse-list { max-height: 200px; overflow-y: auto; margin-top: 8px; font-size: 11px; }
.verse-item { padding: 3px 0; border-bottom: 1px solid #1e293b; font-family: monospace; color: #94a3b8; }
.links { margin-top: 12px; text-align: center; font-size: 11px; }
.links a { color: #64748b; text-decoration: none; }
.links a:hover { color: #94a3b8; }
</style>
</head>
<body>
 <h2>Mizan</h2>
 <p class="sub">Detects and validates Quranic verses on any webpage</p>

<div class="row">
  <span>Enabled</span>
  <label class="toggle">
    <input type="checkbox" id="toggle" checked>
    <span class="slider"></span>
  </label>
</div>

<button class="btn btn-primary" id="scanBtn">Scan This Page</button>

<div class="stats" id="stats" style="display:none">
  Found <span id="count">0</span> verse(s) on this page
</div>

<div class="verse-list" id="verseList"></div>

<div class="links">
  <a href="https://azrirefik.github.io/mizan-checker" target="_blank">Mizan</a> ·
  <a href="https://github.com/azrirefik/mizan-checker" target="_blank">GitHub</a>
</div>

<script src="popup.js"></script>
</body>
</html>
