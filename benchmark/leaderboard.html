<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran Accuracy Leaderboard - Which LLM Fabricates the Least?</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 900px; margin: 0 auto; }
h1 { font-size: 1.75rem; font-weight: 700; color: #f8fafc; }
.subtitle { font-size: 0.875rem; color: #94a3b8; margin: 0.25rem 0 2rem; }
.card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.25rem; }
.card h2 { font-size: 1.125rem; font-weight: 600; color: #e2e8f0; margin-bottom: 1rem; }
table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
th, td { padding: 0.625rem 0.75rem; text-align: left; border-bottom: 1px solid #334155; }
th { color: #64748b; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
td { color: #cbd5e1; }
tr:last-child td { border-bottom: none; }
.rank { font-weight: 700; font-size: 1.125rem; }
.rank-1 { color: #facc15; }
.rank-2 { color: #94a3b8; }
.rank-3 { color: #d97706; }
.model-name { font-weight: 600; color: #f8fafc; }
.score-bar { display: inline-block; height: 8px; border-radius: 4px; margin-right: 0.5rem; vertical-align: middle; }
.bar-good { background: #22c55e; }
.bar-warn { background: #facc15; }
.bar-bad { background: #ef4444; }
.bar-container { width: 100%; background: #334155; border-radius: 4px; height: 8px; }
.bar-fill { height: 8px; border-radius: 4px; transition: width 0.3s; }
.fab-count { font-family: monospace; font-size: 0.8125rem; }
.category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.75rem; }
.cat-card { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 1rem; text-align: center; }
.cat-name { font-size: 0.6875rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.375rem; }
.cat-score { font-size: 1.25rem; font-weight: 700; }
.cat-good { color: #22c55e; }
.cat-mid { color: #facc15; }
.cat-bad { color: #ef4444; }
.empty-state { text-align: center; padding: 3rem 1rem; color: #64748b; }
.empty-state p { margin-bottom: 0.5rem; }
.btn { display: inline-block; padding: 0.5rem 1rem; background: #38bdf8; color: #0f172a; border: none; border-radius: 6px; font-size: 0.8125rem; font-weight: 600; cursor: pointer; text-decoration: none; margin-top: 0.75rem; }
.btn:hover { background: #7dd3fc; }
.date { font-size: 0.75rem; color: #475569; text-align: center; margin-top: 2rem; }
</style>
</head>
<body>
<div class="container">
  <h1>Quran Accuracy Leaderboard</h1>
  <p class="subtitle">Which LLM fabricates Quran verses the least? 50 prompts across 5 categories. Lower score = less fabrication.</p>

  <div class="card" id="overall">
    <h2>Overall Rankings</h2>
    <div id="overall-table"></div>
  </div>

  <div class="card" id="details">
    <h2>Per-Category Breakdown</h2>
    <div id="category-grid"></div>
  </div>

  <p class="date" id="date-info"></p>
</div>

<script>
async function load() {
  let data;
  try {
    const res = await fetch('results/results.json');
    data = await res.json();
  } catch { data = null; }

  if (!data || !data.results || data.results.length === 0) {
    document.getElementById('overall-table').innerHTML =
      '<div class="empty-state"><p>No benchmark results yet.</p><p>Run <code>python runner.py</code> to test LLMs, then refresh.</p><a class="btn" href="https://github.com/azrirefik/mizan-checker">Setup instructions</a></div>';
    document.getElementById('category-grid').innerHTML = '';
    document.getElementById('date-info').textContent = '';
    return;
  }

  document.getElementById('date-info').textContent =
    `Last updated: ${new Date(data.date).toLocaleString()}`;

  // Sort by total_fabrications ascending (fewer = better)
  const sorted = [...data.results].sort((a, b) => a.total_fabrications - b.total_fabrications);
  const maxFab = Math.max(...sorted.map(r => r.total_fabrications), 1);

  // Overall table
  let html = `<table><thead><tr>
    <th>#</th><th>Model</th><th>Accuracy</th><th>Fabrications</th><th>Pass Rate</th>
  </tr></thead><tbody>`;

  const medals = {0: 'rank-1', 1: 'rank-2', 2: 'rank-3'};

  for (let i = 0; i < sorted.length; i++) {
    const m = sorted[i];
    const pct = m.total_prompts > 0 ? (1 - m.total_fabrications / m.total_prompts) * 100 : 100;
    const barClass = pct >= 90 ? 'bar-good' : pct >= 70 ? 'bar-warn' : 'bar-bad';
    const passRate = m.total_prompts > 0 ? ((m.passed_prompts || m.total_prompts - m.total_fabrications) / m.total_prompts * 100).toFixed(1) : '-';

    html += `<tr>
      <td class="rank ${medals[i] || ''}">${i + 1}</td>
      <td class="model-name">${esc(m.model)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:0.5rem">
          <div class="bar-container" style="flex:1"><div class="bar-fill ${barClass}" style="width:${pct}%"></div></div>
          <span style="font-family:monospace;font-size:0.75rem">${pct.toFixed(1)}%</span>
        </div>
      </td>
      <td class="fab-count">${m.total_fabrications}</td>
      <td>${passRate}%</td>
    </tr>`;
  }

  html += '</tbody></table>';
  document.getElementById('overall-table').innerHTML = html;

  // Category breakdown (show for first model or all)
  const cats = ['direct_quote', 'completion', 'fabrication_bait', 'reference_test', 'open_ended'];
  const catLabels = { direct_quote: 'Direct Quote', completion: 'Completion', fabrication_bait: 'Fab. Bait', reference_test: 'Ref. Test', open_ended: 'Open Ended' };

  let catHtml = '';
  for (const m of sorted) {
    if (!m.category_breakdown) continue;
    catHtml += `<div style="margin-bottom:1.5rem"><h3 style="font-size:0.9375rem;color:#94a3b8;margin-bottom:0.75rem">${esc(m.model)}</h3><div class="category-grid">`;

    for (const cat of cats) {
      const score = m.category_breakdown[cat];
      if (score === undefined) continue;
      const total = m.category_totals?.[cat] || 10;
      const pct = (1 - score / total) * 100;
      const cls = pct >= 90 ? 'cat-good' : pct >= 70 ? 'cat-mid' : 'cat-bad';

      catHtml += `<div class="cat-card">
        <div class="cat-name">${catLabels[cat] || cat}</div>
        <div class="cat-score ${cls}">${pct.toFixed(0)}%</div>
        <div style="font-size:0.6875rem;color:#64748b;margin-top:0.25rem">${score}/${total} fab</div>
      </div>`;
    }

    catHtml += '</div></div>';
  }

  document.getElementById('category-grid').innerHTML = catHtml || '<div class="empty-state"><p>No category breakdown data available.</p></div>';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

load();
</script>
</body>
</html>
